services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teatime_ops}
      POSTGRES_USER: ${POSTGRES_USER:-teatime_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - teatime_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ["sh", "-c", "npx prisma migrate deploy && npm run start -- --hostname 0.0.0.0"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
      public_proxy:
        aliases:
          - teatime-app
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5

  meet-sync-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_INTERNAL_URL: http://app:3000
      MEET_SYNC_INTERVAL_SECONDS: ${MEET_SYNC_INTERVAL_SECONDS:-300}
    command: ["node", "scripts/meet-sync-cron.mjs"]
    depends_on:
      app:
        condition: service_healthy

volumes:
  teatime_postgres_data:

networks:
  public_proxy:
    external: true
    name: ${PUBLIC_PROXY_NETWORK:-tiendatic-ai_default}
